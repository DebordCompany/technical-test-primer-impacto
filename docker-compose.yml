services:

  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    container_name: primer-impacto-db-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql
    env_file:
      - .env
    networks:
      - primer-impacto-network-dev
    
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    container_name: primer-impacto-pgadmin-dev
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    env_file:
      - .env
    networks:
      - primer-impacto-network-dev
  
  front:
    build:
      context: ./frontend
      dockerfile: dockerfile.local
    container_name: primer-impacto-front-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONT_PORT}:5173"
    env_file:
      - .env
    networks:
      - primer-impacto-network-dev
  
  back:
    build:
      context: ./backend
      dockerfile: dockerfile.local
    container_name: primer-impacto-back-dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACK_PORT}:3000"
    networks:
      - primer-impacto-network-dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    depends_on:
      - database
    env_file:
      - .env
  
networks:
  primer-impacto-network-dev:
    driver: bridge

volumes:
  db_data:
